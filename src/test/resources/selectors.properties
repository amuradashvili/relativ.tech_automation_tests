# Home page selectors
home.loginTrigger=a[href*='login'];a[href*='sign-in'];button[class*='login'];button[class*='sign']

# Login page selectors
login.username=input[name='username'];input[id*='user'];input[name='email'];input[type='email'];input[type='text']
login.password=input[type='password'];input[name='password'];input[id*='pass']
login.submit=button[type='submit'];input[type='submit'];button[name='login'];button[id*='login']
login.success=a[href*='logout'];button[id*='logout'];a[href*='dashboard'];[data-testid*='dashboard']
login.error=.error;[role='alert'];.alert-danger;[class*='invalid']

